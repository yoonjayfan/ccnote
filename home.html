<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNOTE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="lib/github-markdown.css">
  <link rel="stylesheet" href="lib/highlight-github.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Inter", "Microsoft YaHei", -apple-system, "PingFang SC", sans-serif; display: flex; height: 100vh; line-height: 1.6; }
    #sidebar {
      width: 260px; min-width: 180px; max-width: 500px;
      border-right: 1px solid #ddd; overflow-y: auto; padding: 16px;
      background: #f8f9fa;
    }
    #sidebar h1 { font-size: 1.2em; margin-bottom: 12px; color: #333; }
    #sidebar h2 { font-size: 1em; margin-top: 16px; margin-bottom: 8px; color: #555; }
    #sidebar ul { list-style: none; padding-left: 8px; }
    #sidebar li { margin-bottom: 4px; }
    #sidebar a { color: #0066cc; text-decoration: none; font-size: 0.9em; }
    #sidebar a:hover { text-decoration: underline; }
    #resizer {
      width: 4px; cursor: col-resize; background: transparent;
    }
    #resizer:hover { background: #0066cc44; }
    #content { flex: 1; overflow-y: auto; padding: 24px 32px; }
    #content .markdown-body { font-family: inherit; }
    .empty-state { color: #999; margin-top: 40px; text-align: center; }
  </style>
</head>
<body>
  <div id="sidebar"><h1>CCNOTE</h1><div id="index-content">加载中...</div></div>
  <div id="resizer"></div>
  <div id="content"><p class="empty-state">← 从左侧选择笔记</p></div>
  <script src="lib/marked.min.js"></script>
  <script src="lib/highlight.min.js"></script>
  <script>
    const sidebar = document.getElementById('sidebar');
    const renderer = new marked.Renderer();
    renderer.link = function(token) {
      const href = token.href || token;
      const title = token.title || arguments[1] || '';
      const text = token.text || arguments[2] || '';
      const t = title ? ' title="' + title + '"' : '';
      return '<a href="' + href + '" target="_blank" rel="noopener"' + t + '>' + text + '</a>';
    };
    marked.setOptions({
      renderer,
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
        return hljs.highlightAuto(code).value;
      }
    });
    const resizer = document.getElementById('resizer');
    const content = document.getElementById('content');
    const indexEl = document.getElementById('index-content');

    // 加载 index.md 渲染到侧边栏
    fetch('index.md')
      .then(r => r.text())
      .then(md => { indexEl.innerHTML = marked.parse(md); })
      .catch(() => { indexEl.textContent = '无法加载目录'; });

    // 事件委托：拦截侧边栏链接点击
    sidebar.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (!a || !sidebar.contains(a)) return;
      e.preventDefault();
      const href = a.getAttribute('href');
      if (!href) return;
      fetch(href)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(md => { content.innerHTML = '<div class="markdown-body">' + marked.parse(md) + '</div>'; })
        .catch(() => { content.innerHTML = '<p class="empty-state">无法加载该笔记</p>'; });
    });

    // 侧边栏拖拽调宽
    let dragging = false;
    resizer.addEventListener('mousedown', () => { dragging = true; document.body.style.cursor = 'col-resize'; });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const w = Math.min(500, Math.max(180, e.clientX));
      sidebar.style.width = w + 'px';
    });
    document.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor = ''; });
  </script>
</body>
</html>
